name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run generate
      - run: npm run lint
      - run: npm run typecheck
      # Vitest 4 (rolldown) needs Node >= 20.12 for `node:util.styleText`. The
      # SDK itself supports Node >= 18, which the lint/typecheck/build steps
      # validate across the whole matrix.
      - run: npm test
        if: ${{ matrix.node-version != 18 }}
      - run: npm run build
